<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة ألعاب الطاولة 🎲</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-dice me-2"></i> مكتبة ألعاب الطاولة</span>
            <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#filterSidebar" aria-controls="filterSidebar">
                <i class="fa-solid fa-filter"></i> الفلاتر والبحث
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start shadow" tabindex="-1" id="filterSidebar" aria-labelledby="filterSidebarLabel">
        <div class="offcanvas-header bg-primary text-white">
            <h5 class="offcanvas-title" id="filterSidebarLabel"><i class="fa-solid fa-magnifying-glass me-2"></i> البحث والفلترة</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">ابحث عن لعبة:</label>
                <input type="text" id="searchInput" class="form-control" placeholder="اكتب اسم اللعبة...">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">عدد اللاعبين (معكم):</label>
                <input type="number" id="playersInput" class="form-control" placeholder="مثال: 3" min="1">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">مستوى الصعوبة:</label>
                <select id="difficultyInput" class="form-select">
                    <option value="">الكل</option>
                    <option value="سهل">سهل</option>
                    <option value="متوسط">متوسط</option>
                    <option value="صعب">صعب</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">أقصى مدة للعب (دقيقة):</label>
                <input type="number" id="timeInput" class="form-control" placeholder="مثال: 60" min="10">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">تصنيفات اللعبة:</label>
                <div id="tagsContainer" class="d-flex flex-wrap gap-2">
                    </div>
            </div>
            <hr>
            <button class="btn btn-primary w-100 mb-2" id="applyFiltersBtn" data-bs-dismiss="offcanvas">
                <i class="fa-solid fa-check me-1"></i> تطبيق الفلاتر
            </button>
            <button class="btn btn-outline-danger w-100" id="resetFiltersBtn">
                <i class="fa-solid fa-rotate-right me-1"></i> إعادة ضبط
            </button>
        </div>
    </div>

    <div class="container mb-5">
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">جاري جلب الألعاب...</p>
        </div>
        
        <div id="games-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 d-none">
            </div>
    </div>

    <div class="modal fade" id="gameModal" tabindex="-1" aria-labelledby="gameModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold" id="modalGameTitle">اسم اللعبة</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <img id="modalGameImage" src="" class="img-fluid w-100" style="max-height: 300px; object-fit: cover;" alt="غلاف اللعبة">
                    <div class="p-4">
                        <div id="modalGameTags" class="mb-3"></div>
                        <h6 class="fw-bold text-primary">فكرة اللعبة:</h6>
                        <p id="modalGameIdea" class="text-muted"></p>
                        
                        <div class="row text-center mt-4 border-top pt-3 bg-light rounded shadow-sm mx-1">
                            <div class="col-3 border-end">
                                <i class="fa-solid fa-users text-primary fs-4 mb-1"></i>
                                <div id="modalGamePlayers" class="small fw-bold"></div>
                            </div>
                            <div class="col-3 border-end">
                                <i class="fa-solid fa-clock text-success fs-4 mb-1"></i>
                                <div id="modalGameTime" class="small fw-bold"></div>
                            </div>
                            <div class="col-3 border-end">
                                <i class="fa-solid fa-child text-info fs-4 mb-1"></i>
                                <div id="modalGameAge" class="small fw-bold"></div>
                            </div>
                            <div class="col-3">
                                <i class="fa-solid fa-brain text-danger fs-4 mb-1"></i>
                                <div id="modalGameDifficulty" class="small fw-bold"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer justify-content-center bg-light" id="modalGameLinks">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
